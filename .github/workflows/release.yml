name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  PACKAGE_ID: DimonSmart.NugetMcpServer
  PROJECT_PATH: NugetMcpServer/NugetMcpServer.csproj
  SOLUTION_PATH: NugetMcpServer.sln
  PUBLISH_DIR: artifacts/publish/NugetMcpServer
  RUNTIME_ID: win-x64

jobs:
  release:
    name: Publish release
    runs-on: windows-latest

    steps:
      - name: Validate version tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_NAME -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tags must use vMAJOR.MINOR.PATCH format."
          }

          $version = $env:GITHUB_REF_NAME.Substring(1)
          "VERSION=$version" >> $env:GITHUB_ENV
          "ASSEMBLY_VERSION=$version.0" >> $env:GITHUB_ENV
          "NUPKG_PATH=nupkg/$env:PACKAGE_ID.$version.nupkg" >> $env:GITHUB_ENV
          "WINGET_ASSET_PATH=artifacts/NugetMcpServer-win-x64-$version.zip" >> $env:GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag must point to a commit reachable from origin/main."
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Update MCP server manifest version
        shell: pwsh
        run: |
          $path = "NugetMcpServer/.mcp/server.json"
          $json = Get-Content $path -Raw | ConvertFrom-Json
          $json.version = $env:VERSION
          $json.packages[0].version = $env:VERSION
          $json | ConvertTo-Json -Depth 10 | Set-Content -Encoding UTF8 $path

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        run: >
          dotnet build $env:SOLUTION_PATH
          --configuration Release
          --no-restore
          /p:Version=$env:VERSION
          /p:AssemblyVersion=$env:ASSEMBLY_VERSION
          /p:FileVersion=$env:ASSEMBLY_VERSION
          /p:InformationalVersion=$env:GITHUB_REF_NAME

      - name: Test
        run: dotnet test $env:SOLUTION_PATH --configuration Release --no-build --verbosity normal

      - name: Pack
        run: >
          dotnet pack $env:PROJECT_PATH
          --configuration Release
          --no-build
          --output nupkg
          /p:Version=$env:VERSION
          /p:AssemblyVersion=$env:ASSEMBLY_VERSION
          /p:FileVersion=$env:ASSEMBLY_VERSION
          /p:InformationalVersion=$env:GITHUB_REF_NAME

      - name: Verify NuGet package contents
        shell: pwsh
        run: |
          if (-not (Test-Path $env:NUPKG_PATH -PathType Leaf)) {
            throw "Expected NuGet package '$env:NUPKG_PATH' was not created."
          }

          $entries = tar -tf $env:NUPKG_PATH
          foreach ($required in @(".mcp/server.json", "README.md")) {
            if ($entries -notcontains $required) {
              throw "NuGet package '$env:NUPKG_PATH' does not contain '$required'."
            }
          }

          $manifest = tar -xOf $env:NUPKG_PATH ".mcp/server.json" | ConvertFrom-Json
          if ($manifest.version -ne $env:VERSION) {
            throw "MCP manifest version '$($manifest.version)' does not match '$env:VERSION'."
          }

          if ($manifest.packages[0].version -ne $env:VERSION) {
            throw "MCP package version '$($manifest.packages[0].version)' does not match '$env:VERSION'."
          }

      - name: Publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY secret is required to publish to NuGet."
          }

          dotnet nuget push $env:NUPKG_PATH `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate

      - name: Publish WinGet asset
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime $env:RUNTIME_ID `
            --self-contained true `
            --output $env:PUBLISH_DIR `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:Version=$env:VERSION `
            /p:AssemblyVersion=$env:ASSEMBLY_VERSION `
            /p:FileVersion=$env:ASSEMBLY_VERSION `
            /p:InformationalVersion=$env:GITHUB_REF_NAME

          $exePath = Join-Path $env:PUBLISH_DIR "NugetMcpServer.exe"
          if (-not (Test-Path $exePath -PathType Leaf)) {
            throw "Expected '$exePath' in publish output."
          }

          $assetPath = $env:WINGET_ASSET_PATH
          New-Item -ItemType Directory -Path (Split-Path $assetPath -Parent) -Force | Out-Null
          if (Test-Path $assetPath -PathType Leaf) {
            Remove-Item $assetPath
          }

          Compress-Archive -Path $exePath -DestinationPath $assetPath -CompressionLevel Optimal
          if (-not (Test-Path $assetPath -PathType Leaf)) {
            throw "Expected WinGet asset '$assetPath' was not created."
          }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.NUPKG_PATH }}
            ${{ env.WINGET_ASSET_PATH }}
          generate_release_notes: true
          fail_on_unmatched_files: true
