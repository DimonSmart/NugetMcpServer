name: Publish WinGet

on:
  push:
    tags:
      - 'wg*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish, without v prefix'
        required: true
        type: string

jobs:
  publish-winget:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Get Version
        id: get_version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          }
          else {
            $tag = "${{ github.ref_name }}"
            if ($tag -notmatch '^wg(?<version>\d+\.\d+\.\d+)$') {
              throw "WinGet tags must use wgMAJOR.MINOR.PATCH format."
            }

            $version = $Matches.version
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version '$version' must use MAJOR.MINOR.PATCH format."
          }

          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: DimonSmart.NugetMcpServer
          installers-regex: '\.zip$'
          release-tag: v${{ steps.get_version.outputs.VERSION }}
          version: ${{ steps.get_version.outputs.VERSION }}
          token: ${{ secrets.WINGET_TOKEN }}
